services:
  - type: web
    name: claritydoc
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///database/claritydoc.db
    disk:
      name: claritydoc-data
      mountPath: /opt/render/project/src/database
      sizeGB: 1